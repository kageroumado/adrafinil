name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Swift (format + lint)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftformat swiftlint
      - name: SwiftFormat (check only)
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint lint --quiet

  test:
    name: Shared package tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Run AdrafinilShared unit tests
        run: swift test --package-path AdrafinilShared

  build:
    name: App build (headless, unsigned)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      # Compile-only check — no signing identities on CI. The daemon/helper/CLI are embedded in the
      # app target, so building the Adrafinil scheme covers all four products.
      - name: Build Adrafinil (compile check)
        run: |
          xcodebuild -project Adrafinil.xcodeproj -scheme Adrafinil -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' build
